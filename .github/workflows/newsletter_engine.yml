name: AI Newsletter Engine

on:
  repository_dispatch:
    types: [telegram_trigger]

permissions:
  contents: write

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Use user GITHUB_PAT if configured as a secret, else fallback to default GITHUB_TOKEN
          token: ${{ secrets.GITHUB_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      - name: Run AI Research & Curation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MY_CHAT_ID: ${{ secrets.TELEGRAM_MY_CHAT_ID }}
          DISPATCH_ACTION: ${{ github.event.client_payload.action }}
          DISPATCH_FEEDBACK: ${{ github.event.client_payload.feedback }}
          DISPATCH_SLUG: ${{ github.event.client_payload.slug }}
        run: |
          python script.py

      - name: Commit and Push Draft Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git commit -m "Auto-save/update newsletter draft [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}
