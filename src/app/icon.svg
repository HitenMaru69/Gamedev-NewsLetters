<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Brand gradient matching the app's purple-pink cyber styling -->
    <linearGradient id="favicon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background matching the top header logo wrapper -->
  <rect width="32" height="32" rx="8" fill="url(#favicon-grad)" />

  <!-- Custom Game Dev + AI Brain logo in white -->
  <g transform="translate(4, 4)" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    {/* Futuristic Game Controller Silhouette */}
    <path d="M18 6H6a4 4 0 0 0-4 4v3.5a4.5 4.5 0 0 0 4.5 4.5h.5c1.5 0 2.5-1 3-2.5L11 12h2l1 3.5c.5 1.5 1.5 2.5 3 2.5h.5a4.5 4.5 0 0 0 4.5-4.5V10a4 4 0 0 0-4-4Z" />
    
    {/* Left D-pad */}
    <path d="M6 12h2M7 11v2" stroke-width="1.8" />
    
    {/* Right Action Buttons */}
    <circle cx="15.5" cy="11.5" r="0.8" fill="#ffffff" stroke="none" />
    <circle cx="17.2" cy="12.8" r="0.8" fill="#ffffff" stroke="none" />
    
    {/* Central AI Neural Connection */}
    <path d="M12 7.5v2.8" stroke-width="1.5" />
    <path d="M12 7.5c-0.8-0.8-1.8-0.4-1.8 0.6s1 1.2 1.8 1.6" stroke-width="1.2" />
    <path d="M12 7.5c0.8-0.8 1.8-0.4 1.8 0.6s-1 1.2-1.8 1.6" stroke-width="1.2" />
    
    {/* Connected Nodes */}
    <circle cx="12" cy="6.4" r="1.1" fill="#ffffff" stroke="none" />
    <circle cx="9.6" cy="8.2" r="0.75" fill="#ffffff" stroke="none" />
    <circle cx="14.4" cy="8.2" r="0.75" fill="#ffffff" stroke="none" />
  </g>
</svg>
